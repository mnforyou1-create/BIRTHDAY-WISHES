<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="balloons">

<div class="balloon red" style="left:3%; animation-delay:0s;"></div>
<div class="balloon blue" style="left:8%; animation-delay:2s;"></div>
<div class="balloon yellow" style="left:13%; animation-delay:4s;"></div>
<div class="balloon green" style="left:18%; animation-delay:1s;"></div>
<div class="balloon pink" style="left:23%; animation-delay:3s;"></div>

<div class="balloon purple" style="left:30%; animation-delay:2s;"></div>
<div class="balloon orange" style="left:36%; animation-delay:0s;"></div>
<div class="balloon cyan" style="left:42%; animation-delay:3s;"></div>
<div class="balloon lime" style="left:48%; animation-delay:5s;"></div>
<div class="balloon violet" style="left:54%; animation-delay:1s;"></div>

<div class="balloon red" style="left:60%; animation-delay:4s;"></div>
<div class="balloon blue" style="left:66%; animation-delay:2s;"></div>
<div class="balloon yellow" style="left:72%; animation-delay:0s;"></div>
<div class="balloon green" style="left:78%; animation-delay:3s;"></div>
<div class="balloon pink" style="left:84%; animation-delay:5s;"></div>

<div class="balloon purple" style="left:90%; animation-delay:2s;"></div>
<div class="balloon orange" style="left:95%; animation-delay:4s;"></div>

</div>
<div class="floating-texts">

    <span class="float-text" style="left:10%; animation-delay:1s;">❤️ Love You ❤️</span>

    <span class="float-text" style="left:30%; animation-delay:4s;">🎂 Happy Birthday 🎂</span>

    <span class="float-text" style="left:55%; animation-delay:2s;">💖 Stay Happy 💖</span>

    <span class="float-text" style="left:75%; animation-delay:5s;"> 💖Forever for you with you 💖</span>

    <span class="float-text" style="left:90%; animation-delay:3s;"> 💖Keep Smiling 💖</span>

    <span class="float-text" style="left:85%; animation-delay:3s;"> 💖stay strong 💖</span>
    
    <span class="float-text" style="left:25%; animation-delay:3s;"> 💖Miss you 💖</span>


</div>

<div class="hearts">

    <div class="heart">❤️</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💝</div>

</div>

<div class="stars">

    <div class="star">✨</div>
    <div class="star">⭐</div>
    <div class="star">🌟</div>
    <div class="star">✨</div>
    <div class="star">⭐</div>

</div>

<div class="container">

<img src="images/birthday.jpg" class="photo">

<h1>🎉 Happy Birthday! 🎂</h1>

<p>
May this special day bring you lots of happiness,
love and unforgettable memories.
</p>

<button>
❤️ Enjoy Your Day ❤️
</button>

</div>

</body>

</html>
